    kind: standard
    title: Define tool registry and output model
    description: Establish a data-driven tool registry for setup profiles, with Codex as the default and Claude as a first-class profile. Define how each profile maps to instruction files, command files, subagent files, and any tool-specific install targets while keeping the shared workflow shape consistent.
    status: completed
    notes:
      - Kept bootstrap.py as a thin wrapper around the setup engine.
      - Implemented a registry-driven setup model with Codex and Claude profiles in aii/scripts/setup.py.
      - Added repo templates for Claude instructions and local project instructions.
      - Claude support uses CLAUDE.md plus project-scoped Claude skills under .claude/skills.
    verification:
