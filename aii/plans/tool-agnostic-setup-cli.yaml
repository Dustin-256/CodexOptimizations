  - id: step-2
    kind: standard
    title: Build interactive setup flow
    description: Add an interactive TTY mode to the setup script so the full setup flow can be driven with arrow keys and Enter. Preserve non-interactive flag-based execution so bootstrap, automation, and CI still work without prompts.
    status: completed
    notes:
      - Added a dependency-free interactive prompt system with arrow-key navigation and confirmation screens.
      - Integrated the missing-webhook gate into the interactive flow so it does not fall back to plain yes or no prompts.
    verification:
