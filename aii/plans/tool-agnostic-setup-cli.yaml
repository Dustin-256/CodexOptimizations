    description: Recreate the setup process in a fresh temporary directory using the same bootstrap/init flow a user would run, then verify the interactive and non-interactive paths, the Codex default, the Claude profile, and the reported initialization error condition.
    status: completed
    notes:
      - Validated direct setup installs, wrapper installs, and the interactive wizard in clean temp repos.
      - A repo-root uninstall happened during validation because of an incorrect working directory in one test command; the repo scaffold was restored immediately and the validated setup files were restored from the temp copy.
